<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ONE-TRE">
<meta name="theme-color" content="#5BB9CD">
<title>ONE-TRE 営業先リスト</title>
<style>
  :root{
    --primary:#5BB9CD; --on-primary:#ffffff; --accent:#2a8294; --tint:#EAF6F9;
    --bg:#f3f5f7; --card:#ffffff; --text:#1f2933; --muted:#7b8794; --line:#e3e8ec;
    --green:#3B6D11; --green-bg:#EAF3DE; --amber:#854F0B; --amber-bg:#FAEEDA;
    --gold:#C9A24B; --gold-bg:#FBF4E2; --danger:#A32D2D;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:600px; margin:0 auto; min-height:100vh; background:var(--bg);}
  /* ヘッダー */
  .hd{background:var(--primary); color:var(--on-primary); padding:14px 16px 16px;}
  .hd-top{display:flex; align-items:center; gap:10px;}
  .logo{width:30px; height:30px; flex:0 0 auto;}
  .hd-title{font-size:16px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .gear{background:var(--btn-bg,rgba(255,255,255,.22)); border:none; color:var(--on-primary); width:34px; height:34px; border-radius:10px; cursor:pointer; flex:0 0 auto; display:flex; align-items:center; justify-content:center; padding:0;}
  .gear svg{width:19px; height:19px; display:block;}
  .hd-ver{font-size:10px; color:var(--on-primary); opacity:.65; padding-left:40px; margin-top:2px;}
  /* プロジェクトチップ */
  .projbar{display:flex; gap:8px; overflow-x:auto; padding:12px 16px 4px; -webkit-overflow-scrolling:touch;}
  .projbar::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; padding:7px 14px; border-radius:18px; font-size:13px; font-weight:500; border:1.5px solid var(--line); background:var(--card); color:var(--text); cursor:pointer; white-space:nowrap;}
  .chip.on{background:var(--primary); color:var(--on-primary); border-color:var(--primary);}
  .chip.add{border-style:dashed; color:var(--muted);}
  /* 統計 */
  .stats{display:flex; gap:8px; padding:12px 16px 0;}
  .stat{flex:1; background:var(--card); border-radius:12px; padding:10px 6px; text-align:center; border:1px solid var(--line);}
  .stat .lbl{font-size:11px; color:var(--muted);}
  .stat .num{font-size:22px; font-weight:700; color:var(--text); line-height:1.2;}
  .stat .sub{font-size:11px; color:var(--muted);}
  .countline{text-align:center; font-size:12px; color:var(--muted); padding:8px 16px 2px;}
  .countline b{color:var(--accent); font-weight:700;}
  /* タブ */
  .tabs{display:flex; gap:8px; padding:10px 16px 0;}
  .tab{flex:1; text-align:center; padding:9px; border-radius:10px 10px 0 0; font-size:13px; font-weight:500; background:var(--tint); color:var(--muted); cursor:pointer;}
  .tab.on{background:var(--primary); color:var(--on-primary);}
  /* フィルタ */
  .filters{display:flex; gap:6px; overflow-x:auto; padding:10px 16px 4px;}
  .filters::-webkit-scrollbar{display:none;}
  .fchip{flex:0 0 auto; padding:6px 12px; border-radius:16px; font-size:12px; border:1px solid var(--line); background:var(--card); color:var(--muted); cursor:pointer; white-space:nowrap;}
  .fchip.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  /* リスト */
  .list{padding:6px 16px 90px;}
  .item{background:var(--card); border:1px solid var(--line); border-radius:12px; margin-top:8px; overflow:hidden;}
  .item.done{opacity:.55;}
  .row{display:flex; align-items:center; gap:10px; padding:12px;}
  .check{width:26px; height:26px; flex:0 0 auto; border:2px solid var(--primary); border-radius:7px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff;}
  .check.on{background:var(--primary);}
  .name{flex:1; font-size:15px; font-weight:500; min-width:0; overflow:hidden; text-overflow:ellipsis;}
  .item.done .name{text-decoration:line-through;}
  .closed-badge{display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:600; color:var(--gold); background:var(--gold-bg); padding:3px 8px; border-radius:12px; flex:0 0 auto;}
  .mini-stars{font-size:13px; color:var(--gold); flex:0 0 auto; letter-spacing:1px;}
  .exp{font-size:18px; color:var(--muted); flex:0 0 auto; cursor:pointer; transition:transform .15s;}
  .exp.open{transform:rotate(180deg);}
  .detail{display:none; padding:0 12px 12px; border-top:1px solid var(--line);}
  .detail.open{display:block;}
  .dlabel{font-size:12px; color:var(--muted); margin:12px 0 5px;}
  .stars{display:flex; gap:6px;}
  .star{font-size:28px; cursor:pointer; color:#d6dbe0; line-height:1;}
  .star.on{color:var(--gold);}
  .star-hint{font-size:11px; color:var(--muted); margin-top:3px;}
  .toggle-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
  .tbtn{padding:8px 12px; border-radius:9px; font-size:13px; border:1.5px solid var(--line); background:var(--card); color:var(--text); cursor:pointer;}
  .tbtn.on-ref{background:var(--green-bg); border-color:var(--green); color:var(--green);}
  .tbtn.on-closed{background:var(--gold-bg); border-color:var(--gold); color:#7a5e16;}
  input.txt,textarea.txt{width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 10px; font-size:14px; font-family:inherit; background:#fafbfc; color:var(--text);}
  textarea.txt{resize:vertical; min-height:54px;}
  .editbtns{display:flex; gap:8px; margin-top:12px;}
  .editbtns button{flex:1; padding:9px; border-radius:9px; font-size:13px; border:1px solid var(--line); background:var(--card); cursor:pointer;}
  .editbtns .del{color:var(--danger); border-color:#e9c4c4;}
  /* 集計 */
  .agg{padding:10px 16px 90px;}
  .agg-cards{display:flex; gap:8px;}
  .chart{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 14px; margin-top:12px;}
  .chart h3{margin:0 0 14px; font-size:14px; font-weight:600;}
  .bars{display:flex; align-items:flex-end; gap:10px; height:160px;}
  .barcol{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
  .barval{font-size:12px; font-weight:600; color:var(--accent); margin-bottom:4px;}
  .bar{width:100%; max-width:38px; background:var(--primary); border-radius:6px 6px 0 0; min-height:3px; transition:height .3s;}
  .barlbl{font-size:11px; color:var(--muted); margin-top:6px;}
  .empty{text-align:center; color:var(--muted); font-size:13px; padding:40px 0;}
  /* FAB */
  .fab{position:fixed; left:50%; transform:translateX(-50%); bottom:24px; max-width:600px; width:calc(100% - 32px); display:flex; justify-content:center; pointer-events:none;}
  .fab button{pointer-events:auto; background:var(--primary); color:var(--on-primary); border:none; border-radius:28px; padding:14px 26px; font-size:15px; font-weight:600; box-shadow:0 4px 14px rgba(0,0,0,.18); cursor:pointer;}
  /* モーダル */
  .ov{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; padding:20px; z-index:50;}
  .ov.open{display:flex;}
  .modal{background:var(--card); border-radius:16px; width:100%; max-width:380px; padding:20px; max-height:88vh; overflow-y:auto;}
  .modal h2{margin:0 0 14px; font-size:17px; font-weight:600;}
  .mlabel{font-size:12px; color:var(--muted); margin:12px 0 5px;}
  .colors{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:4px;}
  .cdot{width:38px; height:38px; border-radius:50%; cursor:pointer; border:3px solid transparent;}
  .cdot.on{border-color:var(--text);}
  .mbtns{display:flex; gap:8px; margin-top:18px;}
  .mbtns button{flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:500; border:none; cursor:pointer;}
  .mbtns .cancel{background:var(--line); color:var(--text);}
  .mbtns .ok{background:var(--primary); color:var(--on-primary);}
  .mbtns .del{background:#fff; color:var(--danger); border:1px solid #e9c4c4;}
  /* 目標管理 */
  .goals{padding:10px 16px 90px;}
  .addgoal{width:100%; padding:13px; border-radius:12px; border:1.5px dashed var(--primary); background:var(--card); color:var(--primary); font-size:14px; font-weight:600; cursor:pointer; margin-bottom:12px;}
  .goal{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:14px;}
  .goal-hd{display:flex; align-items:center; gap:8px;}
  .goal-name{flex:1; font-size:16px; font-weight:700; min-width:0;}
  .icbtn{background:none; border:none; color:var(--muted); cursor:pointer; padding:4px; flex:0 0 auto; display:inline-flex; align-items:center;}
  .icbtn svg{width:17px; height:17px; display:block;}
  .pin-ic{width:15px; height:15px; color:var(--primary); margin-right:5px; vertical-align:-2px;}
  .progress-wrap{margin:10px 0 4px;}
  .progress-bar{height:12px; background:var(--tint); border-radius:8px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--primary); border-radius:8px; transition:width .35s;}
  .progress-txt{font-size:12px; color:var(--muted); margin-top:5px;}
  .progress-txt b{color:var(--accent); font-weight:700;}
  .plan{margin-top:12px; border-left:3px solid var(--tint); padding-left:10px;}
  .plan-hd{display:flex; align-items:center; gap:6px;}
  .plan.done .plan-name{text-decoration:line-through; color:var(--muted);}
  .plan.done{opacity:.7;}
  .plan-done-badge{display:inline-block; font-size:11px; color:#fff; background:var(--primary); padding:2px 8px; border-radius:11px; margin-left:4px; text-decoration:none; vertical-align:middle;}
  .plan-name{flex:1; font-size:14px; font-weight:600;}
  .ins{display:block; width:100%; text-align:center; border:none; background:none; color:var(--muted); font-size:12px; padding:2px 0; cursor:pointer; opacity:.55;}
  .ins:hover{opacity:1;}
  .step{display:flex; align-items:center; gap:8px; padding:8px 6px; border-radius:8px; background:var(--bg);}
  .step .sbox{width:20px; height:20px; flex:0 0 auto; border:2px solid var(--primary); border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px;}
  .step .sbox.on{background:var(--primary);}
  .step .stext{flex:1; font-size:14px; cursor:pointer; min-width:0;}
  .step.done .stext{text-decoration:line-through; color:var(--muted);}
  .addplan{margin-top:12px; width:100%; padding:9px; border-radius:9px; border:1.5px dashed var(--line); background:none; color:var(--muted); font-size:13px; cursor:pointer;}
  .addstep{margin-top:6px; width:100%; padding:7px; border-radius:8px; border:1px dashed var(--line); background:none; color:var(--muted); font-size:12px; cursor:pointer;}
  /* 経費 */
  .exp-wrap{padding:0 16px 90px;}
  .exp-item{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:11px 12px; margin-top:8px; cursor:pointer;}
  .exp-main{flex:1; min-width:0;}
  .exp-item-name{font-size:14px; font-weight:500;}
  .exp-memo{font-size:12px; color:var(--muted); margin-top:2px;}
  .exp-amount{font-size:15px; font-weight:700; color:var(--accent); flex:0 0 auto;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="hd-top">
      <svg class="logo" viewBox="0 0 132 132" style="color:var(--on-primary)" xmlns="http://www.w3.org/2000/svg">
        <rect width="132" height="132" rx="30" fill="currentColor" opacity="0.18"/>
        <circle cx="66" cy="66" r="46" fill="none" stroke="currentColor" stroke-width="7" opacity="0.5"/>
        <circle cx="66" cy="66" r="31" fill="none" stroke="currentColor" stroke-width="7" opacity="0.8"/>
        <circle cx="66" cy="66" r="16" fill="currentColor"/>
      </svg>
      <div class="hd-title" id="hdTitle">ONE-TRE 営業先</div>
      <button class="gear" id="refreshBtn" aria-label="最新に更新" title="最新に更新">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11.5a8 8 0 1 0-2.1 5.6"/><path d="M20 4.5v6h-6"/></svg>
      </button>
      <button class="gear" id="dataBtn" aria-label="データのバックアップ" title="データのバックアップ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8 12 4l8.5 4-8.5 4z"/><path d="M3.5 8v8L12 20l8.5-4V8"/><path d="M12 12v8"/></svg>
      </button>
      <button class="gear" id="gearBtn" aria-label="営業リスト設定">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.3"/><path d="M12 2.2v3M12 18.8v3M2.2 12h3M18.8 12h3M5 5l2.1 2.1M16.9 16.9 19 19M19 5l-2.1 2.1M7.1 16.9 5 19"/></svg>
      </button>
    </div>
    <div class="hd-ver">ver <span id="verLabel"></span></div>
  </div>

  <div class="projbar" id="projbar"></div>

  <div class="stats" id="stats"></div>
  <div class="countline" id="countline"></div>

  <div class="tabs">
    <div class="tab on" id="tabList">リスト</div>
    <div class="tab" id="tabAgg">集計</div>
    <div class="tab" id="tabGoal">目標</div>
    <div class="tab" id="tabExp">経費</div>
  </div>

  <div id="listView">
    <div class="filters" id="filters"></div>
    <div class="list" id="list"></div>
  </div>

  <div id="aggView" style="display:none;"></div>
  <div id="goalsView" style="display:none;"></div>
  <div id="expensesView" style="display:none;"></div>
</div>

<div class="fab" id="fab"><button id="addProspect">＋ 営業先を追加</button></div>

<!-- プロジェクト追加/編集モーダル -->
<!-- 経費モーダル -->
<div class="ov" id="expOv">
  <div class="modal">
    <h2 id="expTitle">経費を追加</h2>
    <div class="mlabel">事業名（どの事業の経費か）</div>
    <input class="txt" id="expSource" placeholder="例：ドーナツ作り / ハッピーキッズ">
    <div class="mlabel">品目（何にかかったか）</div>
    <input class="txt" id="expItem" placeholder="例：ドーナツの材料費">
    <div class="mlabel">金額（円）</div>
    <input class="txt" id="expAmount" type="number" inputmode="numeric" placeholder="例：3000">
    <div class="mlabel">メモ（任意）</div>
    <input class="txt" id="expMemo" placeholder="任意">
    <div class="mbtns">
      <button class="cancel" id="expCancel">キャンセル</button>
      <button class="del" id="expDelete" style="display:none;">削除</button>
      <button class="ok" id="expSave">保存</button>
    </div>
  </div>
</div>

<!-- 連動設定モーダル -->
<div class="ov" id="gasOv">
  <div class="modal">
    <h2>経費の連動設定</h2>
    <div class="mlabel">連動スプレッドシートのURL（GASウェブアプリ）</div>
    <input class="txt" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
    <p style="font-size:11px;color:var(--muted);margin:8px 0 0;line-height:1.5;">※このURLは他人に教えないでください。同じURLを別アプリにも設定すると経費が連動します。</p>
    <div class="mbtns">
      <button class="cancel" id="gasCancel">キャンセル</button>
      <button class="del" id="gasClear" style="display:none;">解除</button>
      <button class="ok" id="gasSave">保存</button>
    </div>
  </div>
</div>

<!-- データ（バックアップ）モーダル -->
<div class="ov" id="dataOv">
  <div class="modal">
    <h2>データのバックアップ</h2>
    <div class="mlabel">① 書き出し（今のデータをコピー）</div>
    <textarea class="txt" id="exportArea" readonly style="min-height:70px; font-size:11px;"></textarea>
    <button id="copyBtn" style="width:100%; padding:11px; border-radius:9px; border:none; color:var(--on-primary); background:var(--primary); font-size:14px; font-weight:500; cursor:pointer; margin-top:8px;">📋 コピーする</button>
    <div class="mlabel" style="margin-top:16px;">② 読み込み（別の端末のデータを貼り付けて復元）</div>
    <textarea class="txt" id="importArea" placeholder="ここにコピーしたデータを貼り付け" style="min-height:70px; font-size:11px;"></textarea>
    <div class="mbtns">
      <button class="cancel" id="dataClose">閉じる</button>
      <button class="ok" id="restoreBtn">この内容で復元</button>
    </div>
  </div>
</div>

<div class="ov" id="projOv">
  <div class="modal">
    <h2 id="projModalTitle">営業リストを追加</h2>
    <div class="mlabel">リスト名</div>
    <input class="txt" id="projName" placeholder="例：ワンバランスボクシングジム営業先">
    <div class="mlabel">テーマカラー</div>
    <div class="colors" id="colorList"></div>
    <div class="mlabel" style="margin-top:14px;">自由な色（カスタム）</div>
    <input type="color" id="customColor" value="#DB444C" style="width:60px; height:40px; border:none; background:none; cursor:pointer;">
    <div class="mbtns">
      <button class="cancel" id="projCancel">キャンセル</button>
      <button class="del" id="projDelete" style="display:none;">削除</button>
      <button class="ok" id="projSave">保存</button>
    </div>
  </div>
</div>

<!-- 営業先 名前入力モーダル -->
<div class="ov" id="nameOv">
  <div class="modal">
    <h2 id="nameModalTitle">営業先を追加</h2>
    <div class="mlabel">名前</div>
    <input class="txt" id="prospectName" placeholder="例：山田 様">
    <div class="mbtns">
      <button class="cancel" id="nameCancel">キャンセル</button>
      <button class="ok" id="nameSave">保存</button>
    </div>
  </div>
</div>

<!-- 汎用入力モーダル（目標／プラン／ステップ） -->
<div class="ov" id="inputOv">
  <div class="modal">
    <h2 id="inputTitle">入力</h2>
    <div class="mlabel" id="inputLabel">内容</div>
    <textarea class="txt" id="inputField" style="min-height:48px;"></textarea>
    <div class="mbtns">
      <button class="cancel" id="inputCancel">キャンセル</button>
      <button class="ok" id="inputOk">保存</button>
    </div>
  </div>
</div>

<script>
/* ===================== 設定（ここを変えると初期値が変わります） ===================== */
const STORE_KEY = 'onetre_v1';
const PRESETS = {
  red:      {name:'ワンバランス赤',     primary:'#DB444C', on:'#ffffff', accent:'#A82E35', tint:'#FBE4E5', bg:'#F8F1F1'},
  mocha:    {name:'薄茶×パステルピンク', primary:'#9B7B58', on:'#ffffff', accent:'#C8607D', tint:'#EFE3D0', bg:'#F2E9DB'},
  blue:     {name:'ワンバランス青',     primary:'#5BB9CD', on:'#ffffff', accent:'#2a8294', tint:'#EAF6F9', bg:'#EEF7F9'},
  charcoal: {name:'チャコール（黒）',   primary:'#3A3D42', on:'#ffffff', accent:'#5A6068', tint:'#E7E9EC', bg:'#F2F3F5'},
  pink:     {name:'パステルピンク',     primary:'#F6BCCB', on:'#9B4A5E', accent:'#D26E86', tint:'#FCE6EC', bg:'#FDF1F5'},
  green:    {name:'パステルグリーン',   primary:'#AED9BC', on:'#3C7350', accent:'#4E9E6A', tint:'#E4F2E9', bg:'#F1F8F3'},
  yellow:   {name:'パステルイエロー',   primary:'#F3D77E', on:'#86671A', accent:'#B9912E', tint:'#FBF2D4', bg:'#FCF8E8'}
};
const DEFAULT_DATA = {
  activeProjectId: 'p_one_tre',
  projects: [{
    id:'p_one_tre', name:'ONE-TRE', theme:'red', custom:null,
    prospects:[], goals:[], expenses:[]
  }]
};
/* =============================================================================== */

let data = load();
let activeTab = 'list';
let filter = 'all';
let editingProjectId = null;   // null=新規
let editingProspectId = null;  // null=新規（名前モーダル）

function load(){
  try{ const r = JSON.parse(localStorage.getItem(STORE_KEY)); if(r&&r.projects){ migrate(r); return r; } }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function migrate(d){
  d.projects.forEach(p=>{ if(!p.goals) p.goals=[]; if(!p.expenses) p.expenses=[]; if(p.theme!=='custom' && !PRESETS[p.theme]) p.theme='red'; });
  if(d.goals && d.goals.length){ d.projects[0].goals = d.projects[0].goals.concat(d.goals); }
  delete d.goals;
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }catch(e){} }
function uid(p){ return p+'_'+Date.now()+'_'+Math.floor(Math.random()*1000); }
function getProject(){ return data.projects.find(p=>p.id===data.activeProjectId) || data.projects[0]; }
function thisMonth(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

/* テーマ適用 */
function lum(hex){ const n=hex.replace('#',''); const r=parseInt(n.substr(0,2),16),g=parseInt(n.substr(2,2),16),b=parseInt(n.substr(4,2),16); return (0.299*r+0.587*g+0.114*b)/255; }
function darken(hex,f){ const n=hex.replace('#',''); let r=parseInt(n.substr(0,2),16),g=parseInt(n.substr(2,2),16),b=parseInt(n.substr(4,2),16); r=Math.round(r*f);g=Math.round(g*f);b=Math.round(b*f); return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function lighten(hex,f){ const n=hex.replace('#',''); let r=parseInt(n.substr(0,2),16),g=parseInt(n.substr(2,2),16),b=parseInt(n.substr(4,2),16); r=Math.round(r+(255-r)*f);g=Math.round(g+(255-g)*f);b=Math.round(b+(255-b)*f); return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function themeOf(proj){
  if(proj.theme==='custom' && proj.custom){
    const p=proj.custom;
    return {primary:p, on: lum(p)>0.62?'#333':'#fff', accent:darken(p,0.7), tint:lighten(p,0.88), bg:lighten(p,0.92)};
  }
  return PRESETS[proj.theme] || PRESETS.red;
}
function applyTheme(){
  const t = themeOf(getProject());
  const r = document.documentElement.style;
  r.setProperty('--primary', t.primary);
  r.setProperty('--on-primary', t.on);
  r.setProperty('--accent', t.accent);
  r.setProperty('--tint', t.tint);
  r.setProperty('--bg', t.bg || '#f3f5f7');
  r.setProperty('--btn-bg', (t.on==='#ffffff'||t.on==='#fff') ? 'rgba(255,255,255,.22)' : 'rgba(0,0,0,.10)');
  document.querySelector('meta[name=theme-color]').setAttribute('content', t.primary);
}

/* ===== 統計 ===== */
function calcStats(proj){
  const ps = proj.prospects;
  const total = ps.length;
  const approached = ps.filter(p=>p.approached).length;
  const remaining = total - approached;
  const referrals = ps.filter(p=>p.isReferrer).length;
  const closed = ps.filter(p=>p.isClosed).length;
  const refRate = approached>0 ? Math.round(referrals/approached*100) : 0;
  const clRate  = approached>0 ? Math.round(closed/approached*100) : 0;
  return {total, approached, remaining, referrals, closed, refRate, clRate};
}

function renderAgg(){
  const proj=getProject(); const s=calcStats(proj);
  // 直近6ヶ月
  const months=[]; const d=new Date();
  for(let i=5;i>=0;i--){ const m=new Date(d.getFullYear(),d.getMonth()-i,1); months.push(m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0')); }
  const counts=months.map(m=>proj.prospects.filter(p=>p.approached&&p.approachMonth===m).length);
  const max=Math.max(1,...counts);
  const bars=months.map((m,i)=>{
    const h=Math.round(counts[i]/max*130);
    const label=(+m.split('-')[1])+'月';
    return `<div class="barcol"><div class="barval">${counts[i]}</div><div class="bar" style="height:${h}px"></div><div class="barlbl">${label}</div></div>`;
  }).join('');
  document.getElementById('aggView').innerHTML=`
    <div class="agg">
      <div class="agg-cards">
        <div class="stat"><div class="lbl">成約</div><div class="num">${s.closed}<span style="font-size:14px;color:var(--muted)">/${s.approached}</span></div><div class="sub">成約/アプローチ</div></div>

}

/* ===== 目標管理（目標→プラン→ステップ） ===== */
function findGoal(gid){ return getProject().goals.find(g=>g.id===gid); }
function goalProgress(g){
  let total=0,done=0;
  g.plans.forEach(pl=>pl.steps.forEach(s=>{ total++; if(s.done) done++; }));
  return {total,done,pct: total?Math.round(done/total*100):0};
}
function renderGoals(){
  const goals=getProject().goals;
  let html='<div class="goals"><button class="addgoal" data-act="addgoal">＋ 目標（ビジョン）を追加</button>';
  if(goals.length===0){ html+='<div class="empty">このリストにはまだ目標がありません。<br>上のボタンから「年内に会員300名」などのビジョンを追加できます。</div>'; }
  goals.forEach(g=>{
    const pr=goalProgress(g);
    html+=`<div class="goal">
      <div class="goal-hd">
        <div class="goal-name">${escapeHtml(g.name)}</div>
        <button class="icbtn" data-act="editgoal" data-gid="${g.id}">${IC_EDIT}</button>
        <button class="icbtn" data-act="delgoal" data-gid="${g.id}">${IC_TRASH}</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pr.pct}%"></div></div>
        <div class="progress-txt">完了 <b>${pr.done}/${pr.total}</b> ・ <b>${pr.pct}%</b></div>
      </div>`;
    g.plans.forEach(pl=>{
      const pdone = pl.manualDone || (pl.steps.length>0 && pl.steps.every(s=>s.done));
      html+=`<div class="plan${pdone?' done':''}">
        <div class="plan-hd">
          <div class="plan-name" data-act="toggleplan" data-gid="${g.id}" data-pid="${pl.id}" style="cursor:pointer;">${IC_PIN}${escapeHtml(pl.name)}${pdone?' <span class="plan-done-badge">達成🎉</span>':''}</div>
          <button class="icbtn" data-act="editplan" data-gid="${g.id}" data-pid="${pl.id}">${IC_EDIT}</button>
          <button class="icbtn" data-act="delplan" data-gid="${g.id}" data-pid="${pl.id}">${IC_TRASH}</button>
        </div>
        <button class="ins" data-act="insstep" data-gid="${g.id}" data-pid="${pl.id}" data-pos="0">＋ ここに挿入</button>`;
      pl.steps.forEach((s,i)=>{
        html+=`<div class="step ${s.done?'done':''}">
          <div class="sbox ${s.done?'on':''}" data-act="togglestep" data-gid="${g.id}" data-pid="${pl.id}" data-sid="${s.id}">${s.done?'✓':''}</div>
          <div class="stext" data-act="togglestep" data-gid="${g.id}" data-pid="${pl.id}" data-sid="${s.id}">${escapeHtml(s.text)}</div>
          <button class="icbtn" data-act="editstep" data-gid="${g.id}" data-pid="${pl.id}" data-sid="${s.id}">${IC_EDIT}</button>
          <button class="icbtn" data-act="delstep" data-gid="${g.id}" data-pid="${pl.id}" data-sid="${s.id}">${IC_TRASH}</button>
        </div>
        <button class="ins" data-act="insstep" data-gid="${g.id}" data-pid="${pl.id}" data-pos="${i+1}">＋ ここに挿入</button>`;
      });
      html+=`</div>`;
    });
    html+=`<button class="addplan" data-act="addplan" data-gid="${g.id}">＋ プランを追加</button></div>`;
  });
  html+='</div>';
  document.getElementById('goalsView').innerHTML=html;
}
document.getElementById('goalsView').onclick=(e)=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.dataset.act, gid=t.dataset.gid, pid=t.dataset.pid, sid=t.dataset.sid;
  const g=gid?findGoal(gid):null;
  const pl=(g&&pid)?g.plans.find(x=>x.id===pid):null;
  if(act==='addgoal'){
    openInput('目標を追加','目標（ビジョン）','',(v)=>{ getProject().goals.push({id:uid('g'),name:v,plans:[]}); save(); renderGoals(); });
  }else if(act==='editgoal'){
    openInput('目標を編集','目標（ビジョン）',g.name,(v)=>{ g.name=v; save(); renderGoals(); });
  }else if(act==='delgoal'){
    if(confirm('本当に削除しますか？\nこの目標の中のプラン・ステップもすべて消えます')){ const p=getProject(); p.goals=p.goals.filter(x=>x.id!==gid); save(); renderGoals(); }
  }else if(act==='addplan'){
    openInput('プランを追加','プラン名','',(v)=>{ g.plans.push({id:uid('pl'),name:v,steps:[]}); save(); renderGoals(); });
  }else if(act==='editplan'){
    openInput('プランを編集','プラン名',pl.name,(v)=>{ pl.name=v; save(); renderGoals(); });
  }else if(act==='delplan'){
    if(confirm('本当に削除しますか？\nこのプランの中のステップもすべて消えます')){ g.plans=g.plans.filter(x=>x.id!==pid); save(); renderGoals(); }
  }else if(act==='insstep'){
    const pos=+t.dataset.pos;
    openInput('ステップを追加','やること（具体的な行動）','',(v)=>{ pl.steps.splice(pos,0,{id:uid('st'),text:v,done:false}); save(); renderGoals(); });
  }else if(act==='editstep'){
    const s=pl.steps.find(x=>x.id===sid);
    openInput('ステップを編集','やること（具体的な行動）',s.text,(v)=>{ s.text=v; save(); renderGoals(); });
  }else if(act==='delstep'){
    if(confirm('本当に削除しますか？')){ pl.steps=pl.steps.filter(x=>x.id!==sid); save(); renderGoals(); }
  }else if(act==='toggleplan'){
    pl.manualDone=!pl.manualDone; save(); renderGoals();
  }else if(act==='togglestep'){
    const s=pl.steps.find(x=>x.id===sid); s.done=!s.done; save(); renderGoals();
  }
};

function gasUrl(){ try{ return localStorage.getItem('onetre_gas_url') || DEFAULT_GAS_URL; }catch(e){ return DEFAULT_GAS_URL; } }
let expCache=[]; let expLoading=false; let expLoaded=false;
function expTotal(list){ return list.reduce((s,e)=>s+(+e.amount||0),0); }
function renderExpenses(){
  const view=document.getElementById('expensesView');
  const url=gasUrl();
  if(!url){
    view.innerHTML='<div class="exp-wrap"><div class="empty">経費を別アプリ（ハッピーキッズなど）と連動させるには、<br>連動スプレッドシートの設定が必要です。</div><button class="addgoal" data-act="setgas">連動スプレッドシートを設定</button></div>';
    return;
  }
  const total=expTotal(expCache);
  let html='<div class="exp-wrap">';
  html+='<div style="display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);padding:8px 0 0;"><span>連動中</span><button data-act="reloadexp" style="margin-left:auto;background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;">↻ 再読み込み</button><button data-act="setgas" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;">設定</button></div>';
  html+=`<div class="stats" style="padding:10px 0 0;"><div class="stat"><div class="lbl">経費合計</div><div class="num" style="font-size:18px;">¥${total.toLocaleString()}</div></div><div class="stat"><div class="lbl">件数</div><div class="num">${expCache.length}</div></div></div>`;
  html+='<button class="addgoal" data-act="addexp" style="margin-top:12px;">＋ 経費を追加</button>';
  if(expLoading){ html+='<div class="empty">読み込み中…</div>'; }
  else if(!expLoaded){ html+='<div class="empty">「↻ 再読み込み」で経費を取得します。</div>'; }
  else if(expCache.length===0){ html+='<div class="empty">まだ経費がありません。「＋ 経費を追加」から記録できます。</div>'; }
  else {
    expCache.slice().reverse().forEach(e=>{
      html+=`<div class="exp-item" data-act="editexp" data-eid="${escapeAttr(String(e.id))}"><div class="exp-main"><div class="exp-item-name">${escapeHtml(e.item)}</div><div class="exp-memo">${escapeHtml(e.source||'')}${e.memo?' / '+escapeHtml(e.memo):''}</div></div><div class="exp-amount">¥${(+e.amount||0).toLocaleString()}</div></div>`;
    });
  }
  html+='</div>';
  view.innerHTML=html;
}
function fetchExpenses(){
  const url=gasUrl(); if(!url) return;
  expLoading=true; renderExpenses();
  fetch(url).then(r=>r.json()).then(d=>{
    if(d&&d.ok){ expCache=d.expenses||[]; expLoaded=true; }
    expLoading=false; renderExpenses();
  }).catch(err=>{ expLoading=false; expLoaded=true; renderExpenses(); alert('読み込みに失敗しました。通信環境と連動URLを確認してください。'); });
}
function postExpense(payload){
  const url=gasUrl(); if(!url){ alert('連動先が未設定です'); return; }
  expLoading=true; renderExpenses();
  fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)})
    .then(r=>r.json()).then(d=>{
      expLoading=false;
      if(d&&d.ok){ expCache=d.expenses||expCache; expLoaded=true; renderExpenses(); }
      else { renderExpenses(); alert('保存エラー：'+((d&&d.error)||'不明')); }
    }).catch(err=>{ expLoading=false; renderExpenses(); alert('保存に失敗しました。通信環境を確認してください。'); });
}
document.getElementById('expensesView').onclick=(e)=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const a=t.dataset.act;
  if(a==='addexp') openExpModal(null);
  else if(a==='editexp') openExpModal(t.dataset.eid);
  else if(a==='reloadexp') fetchExpenses();
  else if(a==='setgas') openGasModal();
};
let editingExpId=null;
function openExpModal(eid){
  editingExpId=eid;
  const ex = eid?expCache.find(x=>String(x.id)===String(eid)):null;
  document.getElementById('expTitle').textContent= eid?'経費を編集':'経費を追加';
  document.getElementById('expDelete').style.display= eid?'':'none';
  document.getElementById('expSource').value= ex?(ex.source||''):'';
  document.getElementById('expItem').value= ex?ex.item:'';
  document.getElementById('expAmount').value= ex?ex.amount:'';
  document.getElementById('expMemo').value= ex?(ex.memo||''):'';
  document.getElementById('expOv').classList.add('open');
  setTimeout(()=>document.getElementById('expSource').focus(),100);
}
document.getElementById('expCancel').onclick=()=>document.getElementById('expOv').classList.remove('open');
document.getElementById('expSave').onclick=()=>{
  const source=document.getElementById('expSource').value.trim();
  const item=document.getElementById('expItem').value.trim();
  const amount=Math.round(+document.getElementById('expAmount').value);
  const memo=document.getElementById('expMemo').value.trim();
  if(!item){ alert('品目を入力してください'); return; }
  if(!amount || amount<0 || isNaN(amount)){ alert('金額を正しく入力してください'); return; }
  document.getElementById('expOv').classList.remove('open');
  if(editingExpId){
    const old=expCache.find(x=>String(x.id)===String(editingExpId))||{};
    postExpense({action:'update', id:editingExpId, ts:old.ts||new Date().toLocaleString('ja-JP'), source, project:getProject().name, item, amount, memo});
  } else {
    postExpense({action:'add', id:'e'+Date.now()+Math.floor(Math.random()*1000), ts:new Date().toLocaleString('ja-JP'), source, project:getProject().name, item, amount, memo});
  }
};
document.getElementById('expDelete').onclick=()=>{
  if(confirm('本当に削除しますか？')){ document.getElementById('expOv').classList.remove('open'); postExpense({action:'delete', id:editingExpId}); }
};
/* 連動設定モーダル */
function openGasModal(){
  document.getElementById('gasUrlInput').value=gasUrl();
  document.getElementById('gasClear').style.display= gasUrl()?'':'none';
  document.getElementById('gasOv').classList.add('open');
}
document.getElementById('gasCancel').onclick=()=>document.getElementById('gasOv').classList.remove('open');
document.getElementById('gasSave').onclick=()=>{
  const u=document.getElementById('gasUrlInput').value.trim();
  if(!u || u.indexOf('script.google.com')<0){ alert('GASウェブアプリのURL（script.google.com…/exec）を貼ってください'); return; }
  try{ localStorage.setItem('onetre_gas_url', u); }catch(e){}
  document.getElementById('gasOv').classList.remove('open');
  expLoaded=false; expCache=[]; fetchExpenses();
};
document.getElementById('gasClear').onclick=()=>{
  if(confirm('連動を解除しますか？（経費は連動先シートに残ります）')){ try{ localStorage.removeItem('onetre_gas_url'); }catch(e){} expCache=[]; expLoaded=false; document.getElementById('gasOv').classList.remove('open'); renderExpenses(); }
};

const IC_TRASH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>';
const IC_PIN='<svg class="pin-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4"/><path d="M5 4h11l-2 4 2 4H5"/></svg>';
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

/* ===== ホーム画面アイコン（B-2：青ベタ＋白の的）を生成 ===== */
function buildIcon(size){
  const c=document.createElement('canvas'); c.width=size; c.height=size;
  const x=c.getContext('2d'); const cx=size/2;
  x.fillStyle='#5BB9CD'; x.fillRect(0,0,size,size);
  const lw=size*0.052;
  x.lineWidth=lw; x.strokeStyle='rgba(255,255,255,0.45)';
  x.beginPath(); x.arc(cx,cx,size*0.35,0,Math.PI*2); x.stroke();
  x.strokeStyle='rgba(255,255,255,0.78)';
  x.beginPath(); x.arc(cx,cx,size*0.235,0,Math.PI*2); x.stroke();
  x.fillStyle='#ffffff';
  x.beginPath(); x.arc(cx,cx,size*0.12,0,Math.PI*2); x.fill();
  return c.toDataURL('image/png');
}
function setupAppIcon(){
  const icon180=buildIcon(180); const icon512=buildIcon(512);
  let l=document.createElement('link'); l.rel='apple-touch-icon'; l.setAttribute('sizes','180x180'); l.href=icon180; document.head.appendChild(l);
  let f=document.createElement('link'); f.rel='icon'; f.type='image/png'; f.href=icon180; document.head.appendChild(f);
  const manifest={ name:'ONE-TRE 営業先リスト', short_name:'ONE-TRE', display:'standalone', background_color:'#5BB9CD', theme_color:'#5BB9CD', start_url:'.', icons:[{src:icon180,sizes:'180x180',type:'image/png'},{src:icon512,sizes:'512x512',type:'image/png'}] };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  let m=document.createElement('link'); m.rel='manifest'; m.href=URL.createObjectURL(blob); document.head.appendChild(m);
}

document.getElementById('restoreBtn').onclick=()=>{
  const txt=document.getElementById('importArea').value.trim();

  let obj; try{ obj=JSON.parse(txt); }catch(e){ alert('データの形式が正しくありません'); return; }
  if(!obj || !obj.projects){ alert('このデータは読み込めません（営業リストアプリのバックアップではないようです）'); return; }
  if(confirm('今のデータを、貼り付けた内容で上書きします。よろしいですか？')){
    localStorage.setItem(STORE_KEY, JSON.stringify(obj));
    alert('復元しました。画面を更新します。');
    location.reload();
  }
};
